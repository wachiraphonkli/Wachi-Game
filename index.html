<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตามล่าสมบัติภาษาถิ่นไทย 4 ภาค</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="stars"></div>

<div class="overlay">

    <div class="title">
        <div class="title-glow">
            <h1>🏆 ตามล่าสมบัติภาษาถิ่นไทย 4 ภาค 🏆</h1>
        </div>
        <p class="subtitle">เรียนรู้ภาษาถิ่น พร้อมออกผจญภัยค้นหาสมบัติทั่วประเทศไทย</p>
    </div>

    <div class="hero">
        <div class="character-container">
            <img src="images/boy.png" alt="ตัวละคร" class="character">
            <div class="character-glow"></div>
        </div>
    </div>

    <div class="menu">
        <button class="btn btn-primary" onclick="startGame()">
            <span class="btn-icon">🎮</span>
            <span class="btn-text">เริ่มเกม</span>
        </button>

        <button class="btn btn-secondary" onclick="howToPlay()">
            <span class="btn-icon">📖</span>
            <span class="btn-text">วิธีเล่น</span>
        </button>

        <button class="btn btn-tertiary" onclick="showScore()">
            <span class="btn-icon">🏆</span>
            <span class="btn-text">คะแนนสูงสุด</span>
        </button>

        <button class="btn btn-quaternary" onclick="setting()">
            <span class="btn-icon">⚙️</span>
            <span class="btn-text">ตั้งค่า</span>
        </button>
    </div>

    <div class="footer">
        <p>✨ สนุกไปกับการเรียนรู้ภาษาถิ่น ✨</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
